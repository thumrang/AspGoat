name: Build and Publish AspGoat to Azure

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-push:
    name: Build AspGoat and Push to ACR
    runs-on: ubuntu-latest

    steps:
      - name: Checkout AspGoat repository
        uses: actions/checkout@v5

      - name: Log in to Azure Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push AspGoat
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64
          tags: |
            ${{ secrets.ACR_LOGIN_SERVER }}/aspgoat:latest
            ${{ secrets.ACR_LOGIN_SERVER }}/aspgoat:${{ github.sha }}
